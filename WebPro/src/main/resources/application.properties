# ĐÚNG 100% NHƯ SLIDE THẦY ĐẶNG ĐỨC TRUNG
spring.application.name=WebStore

# Đổi thành none để tránh lỗi schema validation
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# SQL Server - đúng y hệt slide thầy
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WebStore;trustServerCertificate=true;sendStringParametersAsUnicode=true;characterEncoding=UTF-8
spring.datasource.username=sa
spring.datasource.password=123456

# DÒNG QUAN TRỌNG NHẤT – BẮT BUỘC PHẢI CÓ ĐỂ SPRING BOOT 3.3.4 KHÔNG TÌM MYSQL NỮA!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Dev mode
spring.thymeleaf.cache=false

# Upload ảnh
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Session configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# Disable static resource caching for development
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.web.resources.chain.html-application-cache=false

# Fix Character Encoding (UTF-8)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
spring.messages.encoding=UTF-8