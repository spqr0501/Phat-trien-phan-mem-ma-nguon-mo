    <script src="/js/global.js" defer></script>

    <style>
        /* Add scroll to top button */
        #scrollToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a373 0%, #c89968 100%);
            color: white;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 5px 20px rgba(212, 163, 115, 0.4);
            z-index: 999;
            transition: all 0.3s;
        }

        #scrollToTop:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 163, 115, 0.6);
        }

        .cart-icon.bounce {
            animation: cartBounce 0.5s;
        }

        @keyframes cartBounce {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }
        }

        /* Install PWA prompt */
        .pwa-install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: none;
            align-items: center;
            gap: 20px;
            z-index: 1000;
            max-width: 90%;
        }

        .pwa-install-prompt.show {
            display: flex;
        }

        .pwa-install-prompt button {
            background: #d4a373;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .pwa-install-prompt button:hover {
            background: #c89968;
        }
    </style>
</head>

<body>

    <!-- Scroll to top button -->
    <button id="scrollToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- PWA Install Prompt -->
    <div class="pwa-install-prompt" id="pwaPrompt">
        <i class="fas fa-mobile-alt" style="font-size: 32px; color: #d4a373;"></i>
        <div>
            <strong>Cài đặt ứng dụng PCTech Store</strong>
            <p style="font-size: 14px; color: #666; margin: 5px 0 0 0;">Truy cập nhanh hơn, trải nghiệm tốt hơn</p>
        </div>
        <button id="installBtn">Cài đặt</button>
        <button onclick="document.getElementById('pwaPrompt').classList.remove('show')"
            style="background: #e0e0e0; color: #333;">Để sau</button>
    </div>

    <script>
        // PWA Install Prompt
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;

            // Show install prompt after 5 seconds
            setTimeout(() => {
                document.getElementById('pwaPrompt').classList.add('show');
            }, 5000);
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;

                if (outcome === 'accepted') {
                    showToast('Cảm ơn bạn đã cài đặt ứng dụng!', 'success');
                }

                deferredPrompt = null;
                document.getElementById('pwaPrompt').classList.remove('show');
            }
        });

        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed'));
            });
        }
    </script>

    <!-- Rest of the index.html content remains the same -->
