<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <!-- Dùng thuộc tính tenhh của đối tượng p để đặt title -->
    <title th:text="${p.tenhh} + ' - PCTech Store'">Chi tiết sản phẩm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            padding-top: 70px;
        }

        .product-img {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            object-fit: cover;
            height: 500px;
        }

        .price {
            font-size: 36px;
            color: #d4a373;
            font-weight: bold;
        }

        .btn-add-cart {
            background: linear-gradient(45deg, #d4a373, #b8860b);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(212, 163, 115, 0.4);
            transition: all 0.3s;
        }

        .btn-add-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 163, 115, 0.6);
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <!-- Toast thông báo thành công / lỗi -->
    <div class="toast-container">
        <div th:if="${success != null}" class="toast align-items-center text-bg-success border-0 show" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="fas fa-check-circle me-2"></i>
                    <strong th:text="${success}"></strong>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        <div th:if="${error != null}" class="toast align-items-center text-bg-danger border-0 show" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <strong th:text="${error}"></strong>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <div class="row g-5">
            <!-- Hình ảnh sản phẩm -->
            <div class="col-lg-6 mb-4">
                <img th:src="@{'/Images/' + ${p.hinh}}" th:alt="${p.tenhh}" class="img-fluid product-img w-100">
            </div>

            <!-- Thông tin sản phẩm -->
            <div class="col-lg-6">
                <h1 class="display-5 fw-bold mb-3" th:text="${p.tenhh}">Tên sản phẩm</h1>

                <!-- Giá tiền + giảm giá -->
                <div class="d-flex align-items-center mb-4">
                    <span class="price me-3" th:text="'₫' + ${#numbers.formatInteger(p.dongia, 0, 'DEFAULT')}">
                        ₫0
                    </span>

                    <!-- Giá cũ nếu có giảm giá -->
                    <span class="text-muted text-decoration-line-through fs-4"
                        th:if="${p.giamgia != null and p.giamgia > 0}"
                        th:text="'₫' + ${#numbers.formatInteger(p.dongia + p.giamgia, 0, 'DEFAULT')}">
                    </span>

                    <!-- Phần trăm giảm giá -->
                    <span th:if="${p.giamgia != null and p.giamgia > 0}" class="badge bg-danger fs-6 ms-3">
                        -[[${#numbers.formatInteger((p.giamgia * 100) / (p.dongia + p.giamgia), 0)}]]%
                    </span>
                </div>

                <p class="lead text-muted mb-5" th:text="${p.mota}">Mô tả sản phẩm...</p>

                <!-- Form thêm vào giỏ hàng -->
                <form th:action="@{/add-to-cart}" method="post" class="d-inline">
                    <input type="hidden" name="mahh" th:value="${p.mahh}">

                    <div class="mb-4">
                        <label class="form-label fw-bold">Số lượng:</label>
                        <input type="number" name="quantity" value="1" min="1" class="form-control d-inline-block"
                            style="width: 120px;">
                    </div>

                    <button type="submit" class="btn btn-add-cart me-3">
                        <i class="fas fa-cart-plus me-2"></i>
                        Thêm vào giỏ hàng
                    </button>

                    <a href="/" class="btn btn-outline-secondary btn-lg">
                        <i class="fas fa-arrow-left me-2"></i>Quay lại
                    </a>
                </form>

                <!-- Thông tin chính sách -->
                <div class="mt-5 p-4 bg-light rounded">
                    <p class="mb-2"><i class="fas fa-shipping-fast text-success me-2"></i> Giao hàng toàn quốc</p>
                    <p class="mb-2"><i class="fas fa-undo text-primary me-2"></i> Đổi trả trong 7 ngày</p>
                    <p class="mb-0"><i class="fas fa-gift text-danger me-2"></i> Quà tặng kèm cho đơn từ 500k</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Tự động ẩn toast sau 4 giây
        document.querySelectorAll('.toast').forEach(toast => {
            new bootstrap.Toast(toast, { delay: 4000 }).show();
        });
    </script>
</body>

</html>
