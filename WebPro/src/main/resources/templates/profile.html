<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - PCTech Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .avatar-container {
            position: relative;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
        }

        .avatar-upload {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #667eea;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .avatar-upload:hover {
            background: #5568d3;
            transform: scale(1.1);
        }

        .avatar-upload input {
            display: none;
        }

        .user-info h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #666;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input:read-only {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-success {
            background: #d1e7dd;
            color: #0f5132;
            border-left: 4px solid #198754;
        }

        .alert-error {
            background: #f8d7da;
            color: #842029;
            border-left: 4px solid #dc3545;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .back-link:hover {
            gap: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            padding: 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <h1><i class="fas fa-user-circle"></i> My Profile</h1>
        <p class="subtitle">Manage your account information</p>

        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <!-- Profile Header with Avatar -->
        <div class="profile-header">
            <div class="avatar-container">
                <img th:src="${(user.avatar != null ? user.avatar : '/Images/avatar.png') + '?_t=' + #dates.createNow().time}" alt="Profile Avatar"
                    class="avatar" id="avatarPreview">
                <form th:action="@{/profile/avatar}" method="post" enctype="multipart/form-data" id="avatarForm">
                    <label class="avatar-upload" title="Upload Avatar">
                        <i class="fas fa-camera"></i>
                        <input type="file" name="avatar" accept="image/jpeg,image/png"
                            onchange="previewAndUpload(this)">
                    </label>
                </form>
            </div>
            <div class="user-info">
                <h2 th:text="${user.hoten}">User Name</h2>
                <p><i class="fas fa-envelope"></i> <span th:text="${user.email}">user@example.com</span></p>
                <p><i class="fas fa-user-tag"></i> <span
                        th:text="${user.admin ? 'Administrator' : 'Customer'}">Customer</span></p>
            </div>
        </div>

        <!-- Profile Form -->
        <form th:action="@{/profile/update}" method="post">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" th:value="${user.email}" readonly>
                <small style="color: #999;">Email cannot be changed</small>
            </div>

            <div class="form-group">
                <label for="hoten">Full Name *</label>
                <input type="text" id="hoten" name="hoten" th:value="${user.hoten}" required>
            </div>

            <div class="form-group">
                <label for="sodienthoai" Phone Number</label>
                    <input type="tel" id="sodienthoai" name="sodienthoai" th:value="${user.sodienthoai}"
                        placeholder="0123456789">
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="/" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>

        <!-- Quick Stats -->
        <div class="stats">
            <div class="stat-card">
                <h3>0</h3>
                <p>Total Orders</p>
            </div>
            <div class="stat-card">
                <h3>0</h3>
                <p>Wishlist Items</p>
            </div>
            <div class="stat-card">
                <h3>0</h3>
                <p>Reviews</p>
            </div>
        </div>
    </div>

    <script>
        function previewAndUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];

                // Validate file size (2MB)
                if (file.size > 2 * 1024 * 1024) {
                    alert('File size must be less than 2MB!');
                    input.value = '';
                    return;
                }

                // Validate file type
                if (!file.type.match('image/jpeg') && !file.type.match('image/png')) {
                    alert('Only JPEG and PNG images are allowed!');
                    input.value = '';
                    return;
                }

                // Preview
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('avatarPreview').src = e.target.result;
                };
                reader.readAsDataURL(file);

                // Auto-submit form
                if (confirm('Upload this avatar?')) {
                    document.getElementById('avatarForm').submit();
                }
            }
        }
    </script>
    <script src="/js/global.js" defer></script>
</body>

</html>
