<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - PCTech Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 4em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 2em;
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-error {
            background: #f8d7da;
            color: #842029;
            border-left: 4px solid #dc3545;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .password-strength {
            margin-top: 10px;
            font-size: 0.9em;
        }

        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 5px 0;
            overflow: hidden;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .strength-weak {
            background: #dc3545;
            width: 33%;
        }

        .strength-medium {
            background: #ffc107;
            width: 66%;
        }

        .strength-strong {
            background: #28a745;
            width: 100%;
        }

        .password-requirements {
            font-size: 0.85em;
            color: #666;
            margin-top: 10px;
        }

        .password-requirements li {
            margin: 5px 0;
        }

        .password-requirements .valid {
            color: #28a745;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-key"></i>
        </div>

        <h1>Reset Your Password</h1>
        <p class="subtitle">Enter your new password below</p>

        <!-- Error Messages -->
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post" id="resetForm">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="Enter new password" required
                    minlength="6" oninput="checkPasswordStrength()">

                <div class="password-strength" id="strengthIndicator" style="display:none;">
                    <div class="strength-bar">
                        <div class="strength-bar-fill" id="strengthBar"></div>
                    </div>
                    <span id="strengthText"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password"
                    required minlength="6" oninput="checkPasswordMatch()">
                <small id="matchMessage" style="color: #dc3545; display: none;">
                    <i class="fas fa-times-circle"></i> Passwords do not match
                </small>
            </div>

            <div class="password-requirements">
                <strong>Password must:</strong>
                <ul>
                    <li id="req-length"><i class="fas fa-circle"></i> Be at least 6 characters long</li>
                    <li id="req-match"><i class="fas fa-circle"></i> Match confirmation</li>
                </ul>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-check"></i> Reset Password
            </button>
        </form>

        <a href="/login" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const indicator = document.getElementById('strengthIndicator');
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            const lengthReq = document.getElementById('req-length');

            if (password.length === 0) {
                indicator.style.display = 'none';
                lengthReq.classList.remove('valid');
                return;
            }

            indicator.style.display = 'block';

            // Check length
            if (password.length >= 6) {
                lengthReq.classList.add('valid');
                lengthReq.innerHTML = '<i class="fas fa-check-circle"></i> Be at least 6 characters long';
            } else {
                lengthReq.classList.remove('valid');
                lengthReq.innerHTML = '<i class="fas fa-circle"></i> Be at least 6 characters long';
            }

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            bar.className = 'strength-bar-fill';
            if (strength <= 2) {
                bar.classList.add('strength-weak');
                text.textContent = 'Weak';
                text.style.color = '#dc3545';
            } else if (strength <= 3) {
                bar.classList.add('strength-medium');
                text.textContent = 'Medium';
                text.style.color = '#ffc107';
            } else {
                bar.classList.add('strength-strong');
                text.textContent = 'Strong';
                text.style.color = '#28a745';
            }

            checkPasswordMatch();
        }

        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const matchMsg = document.getElementById('matchMessage');
            const submitBtn = document.getElementById('submitBtn');
            const matchReq = document.getElementById('req-match');

            if (confirm.length === 0) {
                matchMsg.style.display = 'none';
                submitBtn.disabled = false;
                matchReq.classList.remove('valid');
                return;
            }

            if (password !== confirm) {
                matchMsg.style.display = 'block';
                submitBtn.disabled = true;
                matchReq.classList.remove('valid');
                matchReq.innerHTML = '<i class="fas fa-circle"></i> Match confirmation';
            } else {
                matchMsg.style.display = 'none';
                submitBtn.disabled = password.length < 6;
                matchReq.classList.add('valid');
                matchReq.innerHTML = '<i class="fas fa-check-circle"></i> Match confirmation';
            }
        }
    </script>
</body>

</html>
