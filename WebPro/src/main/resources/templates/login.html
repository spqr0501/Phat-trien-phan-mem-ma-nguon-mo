<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - PCTech Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .login-box {
            margin-top: 10%;
        }

        .card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }

        .card-header {
            background: #2c3e50;
        }

        .btn-register {
            background: #e74c3c;
            color: white;
        }

        .btn-register:hover {
            background: #c0392b;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg login-box">
                    <div class="card-header bg-dark text-white text-center py-4">
                        <h3><i class="fas fa-microchip"></i> PCTECH STORE</h3>
                        <p class="mb-0 fs-5">Đăng nhập tài khoản</p>
                    </div>
                    <div class="card-body p-4">

                        <!-- Thông báo đăng nhập sai -->
                        <div th:if="${param.error}" class="alert alert-danger text-center mb-4">
                            <i class="fas fa-exclamation-triangle"></i>
                            Tên đăng nhập hoặc mật khẩu không đúng!
                        </div>

                        <!-- Thông báo đăng xuất thành công -->
                        <div th:if="${param.logout}" class="alert alert-success text-center mb-4">
                            <i class="fas fa-check-circle"></i>
                            Bạn đã đăng xuất thành công!
                        </div>

                        <!-- Thông báo đăng ký thành công -->
                        <div th:if="${param.registered}" class="alert alert-success text-center mb-4">
                            <i class="fas fa-party-horn"></i>
                            Đăng ký thành công! Hãy đăng nhập ngay
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên đăng nhập</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i
                                            class="fas fa-user text-primary"></i></span>
                                    <input type="text" name="username" class="form-control form-control-lg"
                                        placeholder="Nhập tên đăng nhập" required autofocus>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i
                                            class="fas fa-lock text-primary"></i></span>
                                    <input type="password" name="password" class="form-control form-control-lg"
                                        placeholder="Nhập mật khẩu" required>
                                </div>
                                <div class="text-end mt-2">
                                    <a href="/forgot-password" class="text-white small">
                                        <i class="fas fa-question-circle"></i> Quên mật khẩu?
                                    </a>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-dark btn-lg w-100 mb-3">
                                <i class="fas fa-sign-in-alt"></i> Đăng nhập
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-2 text-white">Chưa có tài khoản?</p>
                            <a href="/register" class="btn btn-register btn-lg w-100">
                                <i class="fas fa-user-plus"></i> Đăng ký ngay
                            </a>
                        </div>

                        <div class="text-center mt-3">
                            <a href="/" class="text-white text-decoration-none">
                                <i class="fas fa-home"></i> Quay lại trang chủ
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/global.js" defer></script>
</body>

</html>
