<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Wishlist - PCTech Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 80px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 1.3em;
            color: #999;
            margin-bottom: 30px;
        }

        .btn-shop {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-shop:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .product-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #f8f9fa;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            min-height: 50px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn-remove {
            flex: 1;
            padding: 12px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-remove:hover {
            background: #ff3838;
            transform: scale(1.02);
        }

        .btn-view {
            flex: 1;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background: #5568d3;
            transform: scale(1.02);
        }

        .stock-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .in-stock {
            background: #2ecc71;
            color: white;
        }

        .low-stock {
            background: #f39c12;
            color: white;
        }

        .out-stock {
            background: #e74c3c;
            color: white;
        }

        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
            }

            h1 {
                font-size: 2em;
            }
        }

        /* ===== Header (copy from index.html) ===== */
        header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        #logo p {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #d4a373 0%, #f4d03f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu {
            list-style: none;
            display: flex;
            gap: 35px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            padding: 5px 0;
            transition: color 0.3s;
        }

        .menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #d4a373;
            transition: width 0.3s;
        }

        .menu a:hover::after {
            width: 100%;
        }

        .menu a:hover {
            color: #d4a373;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-search {
            display: flex;
            align-items: center;
            margin-left: 30px;
        }

        .header-search input {
            padding: 8px 15px;
            border: 2px solid #444;
            border-radius: 25px 0 0 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 250px;
            outline: none;
            transition: all 0.3s;
        }

        .header-search input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .header-search input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #d4a373;
            width: 300px;
        }

        .header-search button {
            padding: 8px 20px;
            border: 2px solid #d4a373;
            border-left: none;
            border-radius: 0 25px 25px 0;
            background: #d4a373;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .header-search button:hover {
            background: #c89563;
            border-color: #c89563;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-icon a {
            color: white;
            font-size: 24px;
            text-decoration: none;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #e74c3c;
            color: white;
            font-size: 11px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .admin-btn {
            background: linear-gradient(135deg, #d4a373 0%, #c89968 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.3);
            transition: all 0.3s;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 163, 115, 0.4);
        }
    </style>
</head>

<body>
    <header>
        <div id="logo">
            <p>PCTECH STORE</p>
        </div>

        <nav id="hnav">
            <ul class="menu">
                <li><a href="/">TRANG CHỦ</a></li>
                <li><a href="/shop">SẢN PHẨM</a></li>
                <li><a href="/cart">GIỎ HÀNG</a></li>
                <li sec:authorize="isAuthenticated()"><a href="/wishlist">WISHLIST</a></li>
                <li sec:authorize="isAuthenticated()"><a href="/orders/history">ĐƠN HÀNG</a></li>
                <li><a href="/#about">GIỚI THIỆU</a></li>
                <li><a href="/#contact">LIÊN HỆ</a></li>
            </ul>

            <!-- Search Form -->
            <form action="/search" method="get" class="header-search">
                <input type="text" name="keyword" placeholder="Tìm kiếm sản phẩm..." required>
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </nav>

        <div class="user-menu">
            <!-- Dark Mode Toggle -->
            <button id="darkModeToggle" title="Chế độ tối">
                <i class="fas fa-moon"></i>
            </button>

            <div class="cart-icon">
                <a th:href="@{/cart}">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" th:text="${session.cart != null ? session.cart.size() : 0}">0</span>
                </a>
            </div>

            <div sec:authorize="isAuthenticated()">
                <a href="/profile"
                    style="color: white; text-decoration: none; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-user-circle"></i> Profile
                </a>
            </div>

            <div sec:authorize="isAuthenticated()" style="color: #d4a373;">
                <i class="fas fa-user"></i> <span sec:authentication="principal.hoten">User</span>
            </div>

            <div sec:authorize="hasRole('ADMIN')">
                <a href="/admin" class="admin-btn">Quản trị</a>
            </div>

            <div sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit"
                        style="background:none;border:none;color:white;cursor:pointer;font-size:14px;">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </button>
                </form>
            </div>

            <div sec:authorize="isAnonymous()">
                <a href="/login" style="color:white; text-decoration:none;font-weight:500;">
                    <i class="fas fa-sign-in-alt"></i> ĐĂNG NHẬP
                </a>
            </div>
        </div>
    </header>

    <div class="container">
        <h1><i class="fas fa-heart"></i> Wishlist của tôi</h1>
        <p class="subtitle">
            <span th:text="${wishlistCount} + ' sản phẩm'">0 sản phẩm</span>
        </p>

        <!-- Empty State -->
        <div class="empty-state" th:if="${wishlistItems.isEmpty()}">
            <div class="empty-icon">
                <i class="far fa-heart"></i>
            </div>
            <p class="empty-text">Wishlist của bạn đang trống</p>
            <a href="/shop" class="btn-shop">
                <i class="fas fa-shopping-bag"></i> Khám phá sản phẩm
            </a>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" th:if="${!wishlistItems.isEmpty()}">
            <div th:each="item : ${wishlistItems}" class="product-card">
                <!-- Stock Badge -->
                <span th:if="${item.product.soluong != null}" class="stock-badge"
                    th:classappend="${item.product.soluong > 20 ? 'in-stock' : (item.product.soluong > 0 ? 'low-stock' : 'out-stock')}">
                    <span th:if="${item.product.soluong > 20}"><i class="fas fa-check-circle"></i> Còn hàng</span>
                    <span th:if="${item.product.soluong <= 20 && item.product.soluong > 0}"><i
                            class="fas fa-exclamation-triangle"></i> Sắp hết</span>
                    <span th:if="${item.product.soluong <= 0}"><i class="fas fa-times-circle"></i> Hết hàng</span>
                </span>

                <img th:src="@{'/Images/' + ${item.product.hinh} + '?_t=' + ${#dates.createNow().time}}" th:alt="${item.product.tenhh}" class="product-image">

                <div class="product-info">
                    <div class="product-name" th:text="${item.product.tenhh}">Product Name</div>

                    <div class="product-price">
                        <span
                            th:text="${#numbers.formatDecimal(item.product.giaHienTai, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0
                            ₫</span>
                    </div>

                    <div class="product-actions">
                        <button class="btn-remove" th:attr="data-product-id=${item.product.mahh}"
                            onclick="removeFromWishlist(this.getAttribute('data-product-id'))">
                            <i class="fas fa-trash"></i> Xóa
                        </button>
                        <a th:href="@{/product/{id}(id=${item.product.mahh})}" class="btn-view">
                            <i class="fas fa-eye"></i> Xem
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center;">
            <a href="/shop" class="btn-shop">
                <i class="fas fa-arrow-left"></i> Tiếp tục mua sắm
            </a>
        </div>
    </div>

    <script>
        function removeFromWishlist(productId) {
            if (!confirm('Bạn có chắc muốn xóa sản phẩm này khỏi wishlist?')) {
                return;
            }


            fetch(`/api/wishlist/remove/${productId}`, {
                method: 'DELETE'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Reload page to show updated wishlist
                        window.location.reload();
                    } else {
                        alert(data.message || 'Có lỗi xảy ra!');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Có lỗi xảy ra khi xóa sản phẩm!');
                });
        }
    </script>
    <script src="/js/global.js" defer></script>
</body>

</html>
