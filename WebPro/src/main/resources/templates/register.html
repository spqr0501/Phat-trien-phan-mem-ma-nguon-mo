<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg">
                    <div class="card-header bg-dark text-white text-center py-4">
                        <h3><i class="fas fa-user-plus"></i> ĐĂNG KÝ TÀI KHOẢN</h3>
                    </div>
                    <div class="card-body p-5">

                        <!-- Thông báo lỗi -->
                        <div th:if="${error}" class="alert alert-danger text-center">
                            <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
                        </div>

                        <!-- Thông báo từ login (nếu có) -->
                        <div th:if="${param.registered}" class="alert alert-success text-center">
                            Đăng ký thành công! Vui lòng đăng nhập
                        </div>

                        <form th:action="@{/register}" th:object="${user}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Tên đăng nhập</label>
                                <input type="text" th:field="*{tendangnhap}" class="form-control form-control-lg"
                                    required placeholder="Nhập tên đăng nhập">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu</label>
                                <input type="password" th:field="*{matkhau}" class="form-control form-control-lg"
                                    required placeholder="Nhập mật khẩu">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Họ tên</label>
                                <input type="text" th:field="*{hoten}" class="form-control form-control-lg" required
                                    placeholder="Nhập họ tên">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Email</label>
                                <input type="email" th:field="*{email}" class="form-control form-control-lg" required
                                    placeholder="nhap@email.com">
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100">
                                <i class="fas fa-user-plus"></i> Đăng ký ngay
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-white">Đã có tài khoản?
                                <a href="/login" class="text-warning fw-bold">Đăng nhập tại đây</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/global.js" defer></script>
</body>

</html>
