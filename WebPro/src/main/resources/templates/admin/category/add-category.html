<!-- add-category.html (new file, similar to others with AJAX) -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Quản lý loại hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${title}">Thêm loại hàng</h2>

    <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${action}" th:object="${category}" method="post">
        <input type="hidden" th:field="*{maloai}" />

        <div class="mb-3">
            <label>Mã loại</label>
            <input type="number" class="form-control" th:field="*{maloai}" required th:readonly="${action.contains('update')} ? true : false" />
        </div>

        <div class="mb-3">
            <label>Tên loại</label>
            <input type="text" class="form-control" th:field="*{tenloai}" required />
        </div>

        <button type="submit" class="btn btn-primary">Lưu lại</button>
        <a th:href="@{/admin/category}" class="btn btn-secondary">Quay lại</a>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    $('form').on('submit', function(e) {
        e.preventDefault();
       
        var formData = new FormData(this);
        $.ajax({
            url: $(this).attr('action'),
            type: 'POST',
            data: formData,
            contentType: false,
            processData: false,
            success: function(res) {
                if (res.success) {
                    alert(res.message);
                    loadContent('/admin/category'); // reload lại danh sách
                } else {
                    alert('Lỗi: ' + res.message);
                }
            },
            error: function() {
                alert('Có lỗi xảy ra khi gửi dữ liệu!');
            }
        });
    });
});
</script>
</body>
</html>
