<!-- customer-detail.html -->
<div class="box">
    <div class="box-header with-border">
        <h3 class="box-title">Chi tiết khách hàng</h3>
        <div class="box-tools">
            <button type="button" class="btn btn-default btn-sm" onclick="loadContent('/admin/customer')">
                <i class="fa fa-arrow-left"></i> Quay lại
            </button>
        </div>
    </div>
    <div class="box-body">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <table class="table table-bordered" th:if="${customer}">
            <tr>
                <th style="width: 200px;">Mã khách hàng</th>
                <td th:text="${customer.makh}"></td>
            </tr>
            <tr>
                <th>Tên khách hàng</th>
                <td th:text="${customer.tenkh}"></td>
            </tr>
            <tr>
                <th>Địa chỉ</th>
                <td th:text="${customer.diachi}"></td>
            </tr>
            <tr>
                <th>Số điện thoại</th>
                <td th:text="${customer.sdt}"></td>
            </tr>
            <tr>
                <th>Email</th>
                <td th:text="${customer.email}"></td>
            </tr>
        </table>

        <div class="box-footer" th:if="${customer}">
            <a href="#" class="btn btn-primary load-content"
                th:data-url="@{'/admin/customer/edit/' + ${customer.makh}}">
                <i class="fa fa-edit"></i> Chỉnh sửa
            </a>
            <button type="button" class="btn btn-default" onclick="loadContent('/admin/customer')">
                <i class="fa fa-list"></i> Danh sách
            </button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
