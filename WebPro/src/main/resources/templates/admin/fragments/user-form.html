<!-- user-form.html - FIXED: Using form ID and proper script initialization -->
<div class="box" th:fragment="content">
  <div class="box-header with-border">
    <h3 class="box-title" th:text="${title}">Thêm người dùng</h3>
  </div>
  <div class="box-body">
    <div th:if="${msg}" class="alert alert-success alert-dismissible">
      <button type="button" class="close" data-dismiss="alert">×</button>
      <span th:text="${msg}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible">
      <button type="button" class="close" data-dismiss="alert">×</button>
      <span th:text="${error}"></span>
    </div>

    <form th:action="${action}" th:object="${user}" method="post" class="form-horizontal" id="userForm">
      <div class="form-group">
        <label class="col-sm-3 control-label">Tên đăng nhập</label>
        <div class="col-sm-9">
          <input type="text" class="form-control" th:field="*{tendangnhap}" required
            th:readonly="${action?.contains('update')}" />
        </div>
      </div>

      <div class="form-group" th:unless="${action?.contains('update')}">
        <label class="col-sm-3 control-label">Mật khẩu</label>
        <div class="col-sm-9">
          <input type="password" class="form-control" th:field="*{matkhau}" required minlength="6" />
        </div>
      </div>
      <div class="form-group" th:if="${action?.contains('update')}">
        <label class="col-sm-3 control-label">Mật khẩu mới (để trống nếu không đổi)</label>
        <div class="col-sm-9">
          <input type="password" class="form-control" th:field="*{matkhau}" placeholder="Để trống nếu không đổi" />
        </div>
      </div>

      <div class="form-group">
        <label class="col-sm-3 control-label">Họ tên</label>
        <div class="col-sm-9">
          <input type="text" class="form-control" th:field="*{hoten}" required />
        </div>
      </div>

      <div class="form-group">
        <label class="col-sm-3 control-label">Email</label>
        <div class="col-sm-9">
          <input type="email" class="form-control" th:field="*{email}" required />
        </div>
      </div>

      <div class="form-group">
        <div class="col-sm-offset-3 col-sm-9">
          <div class="checkbox">
            <label><input type="checkbox" th:field="*{admin}" /> Quyền Admin</label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <div class="col-sm-offset-3 col-sm-9">
          <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Lưu lại</button>
          <button type="button" class="btn btn-default" onclick="loadContent('/admin/user')"><i class="fa fa-times"></i>
            Hủy</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  $(function () {
    $('#userForm').on('submit', function (e) {
      e.preventDefault();
      var fd = new FormData(this);
      $.ajax({
        url: $(this).attr('action'),
        type: 'POST',
        data: fd,
        contentType: false,
        processData: false,
        success: function (r) {
          if (r.success) {
            showToast(r.message, 'success');
            setTimeout(function () {
              loadContent('/admin/user');
            }, 1000);
          } else {
            showToast(r.message, 'error');
          }
        },
        error: function () {
          showToast('Lỗi hệ thống!', 'error');
        }
      });
    });
  });
</script>
