<!-- customer-list.html (updated with toast for delete) -->
<div class="box">
  <div class="box-header with-border">
    <h3 class="box-title">Danh sách khách hàng</h3>
    <div class="box-tools">
      <a href="#" class="btn btn-success btn-sm load-content" data-url="/admin/customer-add">
        <i class="fa fa-plus"></i> Thêm mới
      </a>
    </div>
  </div>
  <div class="box-body table-responsive no-padding">
    <table class="table table-hover">
      <tr>
        <th>Mã KH</th>
        <th>Tên khách hàng</th>
        <th>Số điện thoại</th>
        <th>Email</th>
        <th style="width: 200px;">Hành động</th>
      </tr>
      <tr th:each="c : ${listCust}">
        <td th:text="${c.makh}"></td>
        <td th:text="${c.tenkh}"></td>
        <td th:text="${c.sdt}"></td>
        <td th:text="${c.email}"></td>
        <td>
          <a href="#" class="btn btn-info btn-xs load-content" th:data-url="@{'/admin/customer/detail/' + ${c.makh}}">
            <i class="fa fa-eye"></i> Chi tiết
          </a>
          <a href="#" class="btn btn-primary btn-xs load-content" th:data-url="@{'/admin/customer/edit/' + ${c.makh}}">
            <i class="fa fa-edit"></i> Sửa
          </a>
          <a href="#" class="btn btn-danger btn-xs delete-btn" th:data-url="@{'/admin/customer/delete/' + ${c.makh}}">
            <i class="fa fa-trash"></i> Xóa
          </a>
        </td>
      </tr>
    </table>
  </div>
</div>

<script>
  $(document).ready(function () {
    $('.delete-btn').on('click', function (e) {
      e.preventDefault();
      if (!confirm('Bạn có chắc chắn muốn xóa khách hàng này?')) return;

      var url = $(this).data('url');
      $.get(url)
        .done(function (res) {
          // SỬ DỤNG TOAST thay vì alert
          if (res.success) {
            showToast(res.message, 'success');
            setTimeout(function () {
              loadContent('/admin/customer');
            }, 1000);
          } else {
            showToast(res.message, 'error');
          }
        })
        .fail(function () {
          showToast('Có lỗi xảy ra khi xóa!', 'error');
        });
    });
  });
</script>
